<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membros | Painel Horizon</title>
<link rel="stylesheet" href="styles.css">
<style>
body{margin:0; font-family:Arial,sans-serif; background:#0b1320; color:white;}
.logo{font-size:20px; font-weight:bold; margin-bottom:30px;}
.main{margin-left:250px; padding:30px; display:flex; flex-direction:column; min-height:100vh;}
.page-header{margin-bottom:30px;}
.page-header h1{margin:0 0 20px; font-size:28px; color:#e8f2ff;}
.btn-membros-servidor{background:linear-gradient(135deg, #5865f2, #7289da); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; font-size:.9rem; transition:all .3s ease;}
.btn-membros-servidor:hover{background:linear-gradient(135deg, #7289da, #5865f2); transform:translateY(-2px); box-shadow:0 4px 12px rgba(88,101,242,.4);}
.search-box{background:rgba(15,27,57,.5); border-radius:12px; padding:15px; border:1px solid rgba(255,255,255,.15); margin-bottom:20px;}
.search-box input{width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:white; padding:12px 15px; border-radius:8px; font-size:.95rem;}
.search-box input::placeholder{color:rgba(255,255,255,.5);}
.search-box input:focus{outline:none; border-color:#2f86ff; background:rgba(255,255,255,.12);}
.members-grid{display:grid; grid-template-columns:repeat(5, 1fr); gap:20px; margin-bottom:30px;}
.member-card{background:rgba(15,27,57,.5); border-radius:16px; padding:20px; border:1px solid rgba(255,255,255,.15); cursor:pointer; transition:all .3s ease; position:relative; overflow:hidden;}
.member-card:hover{background:rgba(15,27,57,.8); border-color:#2f86ff; transform:translateY(-4px); box-shadow:0 8px 24px rgba(47,134,255,.2);}
.member-status{position:absolute; top:12px; right:12px; width:16px; height:16px; border-radius:50%; border:2px solid white;}
.member-status.online{background:#4caf50; box-shadow:0 0 8px rgba(76,175,80,.6);}
.member-status.offline{background:#ff69b4; box-shadow:0 0 8px rgba(255,105,180,.6);}
.member-avatar{width:100px; height:100px; border-radius:50%; border:3px solid #2f86ff; margin:0 auto 15px; object-fit:cover; background:#1a2f5a;}
.member-name{font-size:18px; font-weight:bold; text-align:center; color:#e8f2ff; margin-bottom:3px;}
.member-role{font-size:.9rem; text-align:center; color:#96a4c4; margin-bottom:15px;}
.member-server{font-size:.85rem; text-align:center; color:#7a8ba8; margin-bottom:15px; padding:8px; background:rgba(255,255,255,.05); border-radius:6px;}
.member-stats{display:flex; justify-content:space-around; border-top:1px solid rgba(255,255,255,.1); padding-top:15px;}
.member-stat{text-align:center; flex:1;}
.member-stat-number{font-size:16px; font-weight:bold; color:#2f86ff;}
.member-stat-label{font-size:.75rem; color:#96a4c4; margin-top:3px;}
.no-members{text-align:center; padding:40px 20px; color:#96a4c4;}
.no-members-icon{font-size:48px; margin-bottom:15px;}

/* Modal de Detalhes */
.member-modal{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.8); z-index:1000; align-items:center; justify-content:center; padding:20px;}
.member-modal.active{display:flex;}
.modal-content{background:#0e1a2b; border-radius:16px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; border:1px solid rgba(255,255,255,.15);}
.modal-header{display:flex; justify-content:space-between; align-items:center; padding:20px; border-bottom:1px solid rgba(255,255,255,.15);}
.modal-header h2{margin:0; color:#e8f2ff;}
.modal-close{background:none; border:none; color:white; font-size:24px; cursor:pointer; width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:6px;}
.modal-close:hover{background:rgba(255,255,255,.1);}
.modal-body{padding:20px;}
.modal-profile{display:flex; gap:20px; margin-bottom:25px;}
.modal-avatar{width:120px; height:120px; border-radius:50%; border:3px solid #2f86ff; object-fit:cover; flex-shrink:0;}
.modal-main-info h3{margin:0 0 15px; font-size:24px; color:#e8f2ff;}
.modal-main-info p{margin:5px 0; font-size:.95rem; color:#96a4c4;}
.modal-details{display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:25px;}
.detail-item{background:rgba(255,255,255,.05); border-radius:10px; padding:15px;}
.detail-item-label{font-size:.85rem; color:#96a4c4; margin-bottom:5px;}
.detail-item-value{font-size:.95rem; color:#e8f2ff; font-weight:500;}
.modal-stats{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin-bottom:25px;}
.modal-stat{background:rgba(47,134,255,.1); border-radius:10px; padding:12px; text-align:center; border:1px solid rgba(47,134,255,.3);}
.modal-stat-value{font-size:20px; font-weight:bold; color:#2f86ff; margin-bottom:5px;}
.modal-stat-label{font-size:.8rem; color:#96a4c4;}
@media (max-width:1400px){ .members-grid{grid-template-columns:repeat(4, 1fr);} }
@media (max-width:1100px){ .members-grid{grid-template-columns:repeat(3, 1fr);} }
@media (max-width:900px){ .main{margin-left:0; padding:14px;} .sidebar{position:relative; width:100%; height:auto; padding:15px;} .members-grid{grid-template-columns:repeat(2, 1fr); gap:15px;} }
@media (max-width:600px){ .members-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="bg"></div>

<div class="main">
  <div class="page-header-logo">
    <a href="painel.html" class="logo-link">
      <img src="images/logo_new.png" alt="Logo" class="header-logo">
    </a>
  </div>
  
  <div class="page-header">
    <h1>Membros do Hospital</h1>
    <button onclick="window.location.href='membros-servidor.html'" class="btn-membros-servidor">📱 Membros do Servidor</button>
  </div>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="🔍 Digite o nome do usuário para pesquisar..." />
    <div id="search-info" style="font-size:.85rem; color:#96a4c4; margin-top:8px; display:none;"></div>
  </div>

  <div class="members-grid" id="members-grid">
    <div class="no-members">
      <div class="no-members-icon">📋</div>
      <p>Carregando membros...</p>
    </div>
  </div>
  
  <footer class="watermark-foot">2026 © Horizonte Roleplay Hospital - UCP desenvolvido por Criarp</footer>
</div>

<!-- Modal de Detalhes do Membro -->
<div class="member-modal" id="member-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Informações do Membro</h2>
      <button class="modal-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-profile">
        <img id="modal-avatar" src="images/doctor-male.jpeg" alt="Avatar" class="modal-avatar" onerror="this.src='images/logo_new.png'" />
        <div class="modal-main-info">
          <h3 id="modal-name">Usuário</h3>
          <p><strong>👔 Cargo:</strong> <span id="modal-role">-</span></p>
          <p><strong>📍 Servidor:</strong> <span id="modal-server">-</span></p>
          <p><strong>🎂 Gênero:</strong> <span id="modal-gender">-</span></p>
        </div>
      </div>

      <div class="modal-details">
        <div class="detail-item">
          <div class="detail-item-label">Nome de Usuário</div>
          <div class="detail-item-value" id="modal-username">--</div>
        </div>
        <div class="detail-item">
          <div class="detail-item-label">Discord</div>
          <div class="detail-item-value" id="modal-discord">--</div>
        </div>
        <div class="detail-item">
          <div class="detail-item-label">Data de Registro</div>
          <div class="detail-item-value" id="modal-date">--</div>
        </div>
        <div class="detail-item">
          <div class="detail-item-label">Status</div>
          <div class="detail-item-value" id="modal-status" style="color: #4caf50;">-</div>
        </div>
      </div>

      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-value">0</div>
          <div class="modal-stat-label">Pontos</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value">0</div>
          <div class="modal-stat-label">Reputação</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value">0</div>
          <div class="modal-stat-label">Atividades</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value">0</div>
          <div class="modal-stat-label">Punições</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Verificar se está logado
const loggedUser = sessionStorage.getItem('loggedUser');
if(!loggedUser){
  window.location.href = 'index.html';
}

let todosOsMembros = [];
let membrosExibidos = [];

function navegarPara(url){
  if(url !== '#') window.location.href = url;
}

function fecharModal(){
  document.getElementById('member-modal').classList.remove('active');
}

function carregarMembros(){
  const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
  const onlineUsers = JSON.parse(sessionStorage.getItem('onlinePage') || '[]');
  
  todosOsMembros = accounts.map(account => ({
    ...account,
    isOnline: onlineUsers.includes(account.username),
    likes: Math.floor(Math.random() * 50),
    dislikes: Math.floor(Math.random() * 10)
  }));
  
  membrosExibidos = [...todosOsMembros];
  exibirMembros();
}

function exibirMembros(){
  const grid = document.getElementById('members-grid');
  
  if(membrosExibidos.length === 0){
    grid.innerHTML = '<div class="no-members"><div class="no-members-icon">👤</div><p>Nenhum membro encontrado.</p></div>';
    return;
  }
  
  grid.innerHTML = membrosExibidos.map((member, index) => `
    <div class="member-card" onclick="abrirModal(${membrosExibidos.indexOf(member)})">
      <div class="member-status ${member.isOnline ? 'online' : 'offline'}"></div>
      <img src="${member.gender === 'feminino' ? 'images/nurse-female.jpeg' : 'images/doctor-male.jpeg'}" alt="Avatar" class="member-avatar" onerror="this.src='images/logo_new.png'" />
      <div class="member-name">${member.username}</div>
      <div class="member-role">${member.role || 'Cargo em definição'}</div>
      <div class="member-server">${member.server}</div>
      <div class="member-stats">
        <div class="member-stat">
          <div class="member-stat-number">👍 ${member.likes}</div>
          <div class="member-stat-label">Gostei</div>
        </div>
        <div class="member-stat">
          <div class="member-stat-number">👎 ${member.dislikes}</div>
          <div class="member-stat-label">Não Gostei</div>
        </div>
      </div>
    </div>
  `).join('');
}

function abrirModal(index){
  const member = membrosExibidos[index];
  
  document.getElementById('modal-avatar').src = member.gender === 'feminino' ? 'images/nurse-female.jpeg' : 'images/doctor-male.jpeg';
  document.getElementById('modal-name').textContent = member.username;
  document.getElementById('modal-role').textContent = member.role || 'Cargo em definição';
  document.getElementById('modal-server').textContent = member.server;
  document.getElementById('modal-gender').textContent = member.gender === 'feminino' ? 'Feminino' : 'Masculino';
  document.getElementById('modal-username').textContent = member.username;
  document.getElementById('modal-discord').textContent = member.discord;
  document.getElementById('modal-date').textContent = new Date(member.registeredAt).toLocaleDateString('pt-BR');
  document.getElementById('modal-status').textContent = member.isOnline ? '🟢 Online' : '🔴 Offline';
  document.getElementById('modal-status').style.color = member.isOnline ? '#4caf50' : '#ff69b4';
  
  document.getElementById('member-modal').classList.add('active');
}

// Pesquisa
document.getElementById('search-input').addEventListener('input', (e) => {
  const termo = e.target.value.toLowerCase().trim();
  const searchInfo = document.getElementById('search-info');
  
  if(!termo){
    // Campo vazio - mostra todos
    membrosExibidos = [...todosOsMembros];
    searchInfo.style.display = 'none';
  } else {
    // Filtra conforme digita - mostra parciais e completos
    membrosExibidos = todosOsMembros.filter(member => 
      member.username.toLowerCase().includes(termo)
    );
    
    // Ordena: primeiro os que começam com o termo, depois os que contêm
    membrosExibidos.sort((a, b) => {
      const aStart = a.username.toLowerCase().startsWith(termo);
      const bStart = b.username.toLowerCase().startsWith(termo);
      if(aStart && !bStart) return -1;
      if(!aStart && bStart) return 1;
      return a.username.localeCompare(b.username);
    });
    
    if(membrosExibidos.length === 0){
      searchInfo.textContent = `Nenhum membro encontrado para "${termo}"`;
      searchInfo.style.color = '#ff6b6b';
    } else if(membrosExibidos.length === 1){
      searchInfo.textContent = `Encontrado 1 membro: ${membrosExibidos[0].username}`;
      searchInfo.style.color = '#4caf50';
    } else {
      searchInfo.textContent = `${membrosExibidos.length} membros encontrados`;
      searchInfo.style.color = '#96a4c4';
    }
    searchInfo.style.display = 'block';
  }
  
  exibirMembros();
});

// Carregar membros ao abrir a página
carregarMembros();

// Simular usuário online quando está na página
const updateOnlineStatus = () => {
  const onlineUsers = JSON.parse(sessionStorage.getItem('onlinePage') || '[]');
  if(!onlineUsers.includes(loggedUser)){
    onlineUsers.push(loggedUser);
    sessionStorage.setItem('onlinePage', JSON.stringify(onlineUsers));
    carregarMembros();
  }
};

updateOnlineStatus();

// Ao sair da página, remover do status online
window.addEventListener('beforeunload', () => {
  const onlineUsers = JSON.parse(sessionStorage.getItem('onlinePage') || '[]');
  const index = onlineUsers.indexOf(loggedUser);
  if(index > -1){
    onlineUsers.splice(index, 1);
    sessionStorage.setItem('onlinePage', JSON.stringify(onlineUsers));
  }
});

// Fechar modal ao clicar fora
document.getElementById('member-modal').addEventListener('click', (e) => {
  if(e.target.id === 'member-modal'){
    fecharModal();
  }
});
</script>
<script src="script.js"></script>
</body>
</html>
