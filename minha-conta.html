<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta | Painel Horizon</title>
<link rel="stylesheet" href="styles.css">
<style>
body{margin:0; font-family:Arial,sans-serif; background:#0b1320; color:white;}
.logo{font-size:20px; font-weight:bold; margin-bottom:30px;}
.main{margin-left:250px; padding:30px; display:flex; flex-direction:column; min-height:100vh;}
.profile-header{background:rgba(15,27,57,.5); border-radius:16px; padding:30px; margin-bottom:30px; display:flex; gap:20px; align-items:flex-start;}
.profile-avatar{width:120px; height:120px; border-radius:50%; border:3px solid #2f86ff; object-fit:cover; flex-shrink:0;}
.profile-info{flex:1;}
.profile-name{font-size:28px; font-weight:bold; margin:0; color:#e8f2ff;}
.profile-meta{display:flex; gap:30px; margin-top:15px; font-size:.9rem; color:#bddcff;}
.profile-meta span{display:flex; align-items:center; gap:6px;}
.account-details{display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-bottom:30px;}
.detail-card{background:rgba(15,27,57,.5); border-radius:12px; padding:20px; border-left:4px solid #2f86ff;}
.detail-card h3{margin:0 0 15px; color:#90c5ff; font-size:.95rem; text-transform:uppercase;}
.detail-row{display:flex; justify-content:space-between; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,.1);}
.detail-row:last-child{margin-bottom:0; padding-bottom:0; border-bottom:none;}
.detail-label{color:#96a4c4; font-size:.88rem;}
.detail-value{color:#e8f2ff; font-weight:500;}
.stats-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-bottom:30px;}
.stat-box{background:rgba(15,27,57,.5); border-radius:12px; padding:15px; text-align:center; border:1px solid rgba(255,255,255,.1);}
.stat-number{font-size:24px; font-weight:bold; color:#2f86ff; margin-bottom:5px;}
.stat-label{font-size:.85rem; color:#96a4c4;}
.btn-logout{background:#ff5252; color:white; border:none; padding:12px 24px; border-radius:8px; cursor:pointer; font-weight:600; font-size:.95rem; margin-top:20px;}
.btn-logout:hover{background:#ff3838;}
@media (max-width:900px){ .main{margin-left:0; padding:14px;} .sidebar{position:relative; width:100%; height:auto;} .profile-header{flex-direction:column; text-align:center;} .profile-avatar{margin:0 auto;} }
</style>
</head>
<body>
<div class="bg"></div>

<div class="main">
  <div class="page-header-logo">
    <a href="painel.html" class="logo-link">
      <img src="images/logo_new.png" alt="Logo" class="header-logo">
    </a>
  </div>
  
  <div class="profile-header">
    <img id="profile-avatar" src="images/doctor-male.png" alt="Perfil" class="profile-avatar" onerror="this.src='images/logo_new.png'" />
    <div class="profile-info">
      <h1 class="profile-name" id="profile-name">Usuário</h1>
      <div class="profile-meta">
        <span>👔 <span id="profile-role">Cargo Indefinido</span></span>
        <span>📍 <span id="profile-server">Servidor 1</span></span>
        <span>📅 <span id="profile-register">--</span></span>
      </div>
    </div>
  </div>

  <div class="account-details">
    <div class="detail-card">
      <h3>Dados da Conta</h3>
      <div class="detail-row">
        <span class="detail-label">Nome de Usuário</span>
        <span class="detail-value" id="detail-username">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cargo</span>
        <span class="detail-value" id="detail-role">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Servidor</span>
        <span class="detail-value" id="detail-server">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Sexo</span>
        <span class="detail-value" id="detail-gender">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Discord</span>
        <span class="detail-value" id="detail-discord">--</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Data de Registro</span>
        <span class="detail-value" id="detail-date">--</span>
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-number">0</div>
      <div class="stat-label">Pontos</div>
    </div>
    <div class="stat-box">
      <div class="stat-number">0</div>
      <div class="stat-label">Reputação</div>
    </div>
    <div class="stat-box">
      <div class="stat-number">0</div>
      <div class="stat-label">Atividades</div>
    </div>
    <div class="stat-box">
      <div class="stat-number">0</div>
      <div class="stat-label">Punições</div>
    </div>
  </div>

  <button class="btn-logout" onclick="desconectar()">DESCONECTAR</button>
  
  <footer class="watermark-foot">2026 © Horizonte Roleplay Hospital - UCP desenvolvido por Criarp</footer>
</div>

<script>
function navegarPara(url){
  if(url !== '#') window.location.href = url;
}

function desconectar(){
  sessionStorage.removeItem('loggedUser');
  window.location.href = 'index.html';
}

// Carregar dados do usuário
const loggedUser = sessionStorage.getItem('loggedUser');
if(!loggedUser){
  window.location.href = 'index.html';
} else {
  const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
  const account = accounts.find(acc => acc.username === loggedUser);
  if(account){
    // Determinar avatar baseado no sexo
    const avatar = account.gender === 'feminino' ? 'images/nurse-female.jpeg' : 'images/doctor-male.jpeg';
    document.getElementById('profile-avatar').src = avatar;
    document.getElementById('profile-name').textContent = account.username;
    document.getElementById('profile-role').textContent = account.role || 'Cargo em definição';
    document.getElementById('profile-server').textContent = account.server;
    document.getElementById('profile-register').textContent = new Date(account.registeredAt).toLocaleDateString('pt-BR');
    
    document.getElementById('detail-username').textContent = account.username;
    document.getElementById('detail-role').textContent = account.role || 'Cargo em definição';
    document.getElementById('detail-gender').textContent = account.gender === 'feminino' ? 'Feminino' : 'Masculino';
    document.getElementById('detail-discord').textContent = account.discord;
    document.getElementById('detail-server').textContent = account.server;
    document.getElementById('detail-date').textContent = new Date(account.registeredAt).toLocaleDateString('pt-BR');
  }
}

function gerarRG(){
  const rg = Math.random().toString().substr(2, 8) + '-' + Math.floor(Math.random() * 89 + 10);
  return rg;
}
</script>
<script src="script.js"></script>
</body>
</html>
